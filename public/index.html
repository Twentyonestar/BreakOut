  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #04050f;
      --panel: #080d1e;
      --border: #1a2a6c;
      --accent1: #00f5ff;
      --accent2: #ff006e;
      --accent3: #adff2f;
      --glow1: rgba(0, 245, 255, 0.4);
      --glow2: rgba(255, 0, 110, 0.4);
      --text: #e0f0ff;
      --dim: #4a6080;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0, 245, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 20%, rgba(255, 0, 110, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.1) 2px, rgba(0, 0, 0, 0.1) 4px);
      pointer-events: none;
      z-index: 100;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.01em;
      color: var(--accent1);
      text-shadow: 0 0 20px var(--glow1), 0 0 60px var(--glow1);
      margin-bottom: 12px;
    }

    .hud {
      display: flex;
      gap: 24px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      align-items: end;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hud-item label {
      color: var(--dim);
      display: block;
      font-size: 0.6rem;
      margin-bottom: 2px;
    }

    .hud-item span {
      color: var(--accent1);
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
    }

    #lives-display {
      color: var(--accent2) !important;
      text-shadow: 0 0 10px var(--glow2);
    }

    #score-display {

    }

    #level-display {

      text-shadow: 0 0 10px rgba(173, 255, 47, 0.4);
    }

    #player-display {
      color: var(--accent1) !important;
      text-shadow: 0 0 10px var(--glow1);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }

    .hud-quit-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 8px 14px;
      border: 1px solid rgba(255, 0, 110, 0.7);
      background: transparent;
      color: var(--accent2);
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(255, 0, 110, 0.16);

    .hud-quit-btn:hover {
      background: rgba(255, 0, 110, 0.08);
      box-shadow: 0 0 18px rgba(255, 0, 110, 0.28);
    }

    .canvas-wrapper {
      position: relative;
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(0, 245, 255, 0.1), 0 0 30px rgba(0, 245, 255, 0.08), inset 0 0 60px rgba(0, 0, 30, 0.8);

    canvas {

    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(4, 5, 15, 0.93);

    }

    .overlay p {

    .final-score-box .fs-name {

    .final-score-box .fs-score {

    .final-score-box .fs-detail {
      font-size: 0.65rem;
      color: var(--dim);

    }

    .name-section {

      align-items: center;
      gap: 8px;

    .name-section label {

    .name-input {

    .lb-header {

    .lb-header-line {

    .lb-header-line.rev {
      background: linear-gradient(to left, transparent, var(--border));

    .lb-header-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      white-space: nowrap;
    }

    .lb-empty {
      color: var(--dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 10px 0;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;

      margin-bottom: 3px;
      border: 1px solid rgba(26, 42, 108, 0.4);
      background: rgba(0, 0, 20, 0.35);
    }

    .lb-row.is-new {
      animation: newFlash 0.5s ease 4;

    @keyframes newFlash {

        border-color: rgba(26, 42, 108, 0.4);
      }

      50% {

    .lb-rank {
      font-family: 'Orbitron', sans-serif;

      text-align: center;
    }

    .lb-rank.gold {

    }

    .lb-rank.silver {

      left: 0;
      right: 0;
      height: 90px;
      background: linear-gradient(to top, rgba(4, 5, 15, 0.95), transparent);
      align-items: center;
      justify-content: center;

      touch-action: none;

    .touch-zone {

      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.35;
      transition: opacity 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .touch-zone:active,
    .touch-zone.active {
      opacity: 0.85;
    }

    @media (pointer: coarse) {
      .touch-controls {
        display: none;
      }

      .controls {
        display: none;
      }

      body {
        overflow: hidden;
        padding: 8px;
        box-sizing: border-box;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
      }

      .canvas-wrapper {
        width: 100%;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      canvas {
        touch-action: none;
        width: 100%;
        height: auto;
        display: block;
      }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      query,
      orderByChild,
      limitToLast,
      get,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA09Mrym2a5a2yrZT3ceAtP17j6W35LQV4",
      authDomain: "moxn-472be.firebaseapp.com",
      databaseURL: "https://moxn-472be-default-rtdb.firebaseio.com",
      projectId: "moxn-472be",
      storageBucket: "moxn-472be.firebasestorage.app",
      messagingSenderId: "963494233910",
      appId: "1:963494233910:web:44990b6dab3975a9c01597"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const SCORES_REF = "scores";

    function sanitizeName(name) {
      const trimmed = (name || "").trim().replace(/\s+/g, " ");
      return Array.from(trimmed).slice(0, 10).join("");
    }

    window.fbSave = async function (name, score) {
      try {
        const cleanName = sanitizeName(name);
        if (!cleanName) {
          throw new Error("이름이 비어 있습니다.");
        }

        console.log("저장 시도 projectId:", firebaseConfig.projectId);
        console.log("저장 시도 databaseURL:", firebaseConfig.databaseURL);

        const result = await push(ref(db, SCORES_REF), {
          name: cleanName,
          score: Number(score) || 0,
          ts: Date.now()
        });

        console.log("저장 성공 key:", result.key);
        return result.key;
      } catch (e) {
        console.error("fbSave error:", e);
        alert("Firebase 저장 실패: " + (e?.message || e));
        throw e;
      }
    };

    window.fbLoad = async function () {
      try {
        const q = query(ref(db, SCORES_REF), orderByChild("score"), limitToLast(10));
        const snap = await get(q);
        const rows = [];
        snap.forEach(child => rows.push(child.val()));
        rows.sort((a, b) => b.score - a.score || b.ts - a.ts);
        return rows;
      } catch (e) {
        console.warn("fbLoad error", e);
        return [];
      }
    };

    window.fbSubscribe = function (callback) {
      const q = query(ref(db, SCORES_REF), orderByChild("score"), limitToLast(10));
      onValue(q, snap => {
        const rows = [];
        snap.forEach(child => rows.push(child.val()));
        rows.sort((a, b) => b.score - a.score || b.ts - a.ts);
        callback(rows);
      });
    };

    window.fbSanitizeName = sanitizeName;

    window.fbSubscribe(rows => {
      window._fbBoard = rows;

      if (window.lbRenderFb) {
        window.lbRenderFb('lb-start-wrap', null, null);
        window.lbRenderFb('lb-go-wrap', null, null);
      }
    });
  </script>

<body>
  <h1>Break Out!</h1>

  <div class="hud">
    <div class="hud-item">
      <label>PLAYER</label>

    </div>

  <div class="canvas-wrapper">
    <canvas id="game" width="520" height="520"></canvas>

    <div class="overlay start" id="ov-start">

    <div class="overlay win" id="ov-win" style="display:none">

        style="color:var(--text);font-family:'Orbitron',sans-serif;font-size:1rem;margin-bottom:14px"></p>
      <button class="btn" onclick="nextLevel()">NEXT LEVEL ▶</button>

  </div>

  <div class="controls">
    <div><kbd>마우스</kbd> 조준 / <kbd>클릭</kbd> 발사</div>
    <div><kbd>Enter</kbd> 시작 / <kbd>Q</kbd> 즉시 종료 저장</div>
  </div>

  <div class="touch-controls" id="touch-controls">
    <div class="touch-zone" id="touch-left">◀</div>
    <div class="touch-zone" id="touch-fire">●</div>
    <div class="touch-zone" id="touch-right">▶</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;

    let gameState = "idle";
    let score = 0, lives = 1;
    let nextBallCount = 1;
    let aimAngle = -Math.PI * 0.75;
    let isAiming = true;
    let currentPlayer = "PLAYER";
    let gameOverMode = "dead";
    let isEndingGame = false;

    const LS_KEY = "brkbrkboard_v1";

    function lbLoad() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
      catch { return []; }
    }

    function sanitizeName(name) {
      if (window.fbSanitizeName) return window.fbSanitizeName(name);
      return Array.from((name || "").trim().replace(/\s+/g, " ")).slice(0, 10).join("");
    }

    function lbSaveLocal(name, sc) {
      let board = lbLoad();
      board.push({
        name: sanitizeName(name),
        score: Number(sc) || 0,
        ts: Date.now()
      });
      board.sort((a, b) => b.score - a.score || b.ts - a.ts);
      board = board.slice(0, 10);
      try { localStorage.setItem(LS_KEY, JSON.stringify(board)); } catch (e) { }
      return board;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    window.lbRenderFb = lbRender;

    function lbRender(wrapId, highlightName, highlightScore) {
      const wrap = document.getElementById(wrapId);
      if (!wrap) return;

      const board = (window._fbBoard && window._fbBoard.length > 0
        ? window._fbBoard
        : lbLoad()).slice(0, 10);

      const RANKS = [
        { label: "1ST", cls: "gold" },
        { label: "2ND", cls: "silver" },
        { label: "3RD", cls: "bronze" }
      ];

      let html = `
    <div class="lb-header">
      <div class="lb-header-line rev"></div>
      <div class="lb-header-title">TOP RANKING</div>
      <div class="lb-header-line"></div>
    </div>`;

      if (board.length === 0) {
        html += `<div class="lb-empty">아직 기록이 없습니다</div>`;
      } else {
        board.forEach((e, i) => {
          const isNew = highlightName && e.name === highlightName && e.score === highlightScore;
          html += `
        <div class="lb-row${isNew ? " is-new" : ""}">
          <span class="lb-rank ${RANKS[i].cls}">${RANKS[i].label}</span>
          <span class="lb-name">${esc(e.name)}</span>
          <span class="lb-score">${String(e.score).padStart(5, "0")}</span>
        </div>`;
        });
      }

      wrap.innerHTML = `<div class="lb-wrap">${html}</div>`;
    }

    const LAUNCH_X = W - 20;
    const LAUNCH_Y = H - 20;

    let balls = [];

    function makeBall() {
      return {
        x: LAUNCH_X,
        y: LAUNCH_Y,
        r: 7,
        vx: 0,
        vy: 0,
        attached: true,
        trail: []
      };
    }

    let bricks = [];
    const BRICK_COLS = 7, BRICK_PAD = 4, BRICK_TOP = 50;
    const BRICK_H = 22, BRICK_MOVE = BRICK_H + BRICK_PAD;

    function addBrickRow() {
      bricks.forEach(b => { b.y += BRICK_MOVE; });

      const cols = BRICK_COLS;
      const bw = (W - BRICK_PAD * (cols + 1)) / cols;
      const count = 2 + Math.floor(Math.random() * (cols - 1));
      const positions = Array.from({ length: cols }, (_, i) => i)
        .sort(() => Math.random() - 0.5)
        .slice(0, count);

      const hp = nextBallCount;
      const brickColor = hp >= 5
        ? { fill: "#ff006e", glow: "rgba(255,0,110,0.8)", pts: hp * 50 }
        : hp >= 3
          ? { fill: "#ffa500", glow: "rgba(255,165,0,0.8)", pts: hp * 40 }
          : hp >= 2
            ? { fill: "#adff2f", glow: "rgba(173,255,47,0.6)", pts: hp * 30 }
            : { fill: "#00f5ff", glow: "rgba(0,245,255,0.5)", pts: 10 };

      positions.forEach(c => {
        bricks.push({
          x: BRICK_PAD + c * (bw + BRICK_PAD),
          y: BRICK_TOP,
          w: bw, h: BRICK_H,
          color: brickColor,
          hp, maxHp: hp, alive: true
        });
      });
    }

    function buildBricks() {
      bricks = [];
      for (let i = 0; i < 2; i++) addBrickRow();
    }

    let particles = [], flashes = [];

    function spawnParticles(x, y, color, n = 8) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 1 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 1,
          decay: 0.04 + Math.random() * 0.04,
          r: 2 + Math.random() * 3,
          color
        });
      }
    }

    function addFlash(x, y, text, color) {
      flashes.push({ x, y, text, color, life: 1, vy: -1.2 });
    }

    const keys = {};
    let mouseX = null, mouseY = null;

    document.addEventListener("keydown", e => {
      keys[e.code] = true;

      if (e.code === "Space") {
        e.preventDefault();
        if (gameState === "playing") releaseBall();
      }

      if (e.code === "KeyQ") {
        e.preventDefault();
        quitGame();
      }

      if (["ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
    });

    document.addEventListener("keyup", e => {
      keys[e.code] = false;
    });

    canvas.addEventListener("mousemove", e => {
      const r = canvas.getBoundingClientRect();
      mouseX = e.clientX - r.left;
      mouseY = e.clientY - r.top;
    });

    canvas.addEventListener("click", () => {
      if (gameState === "playing") releaseBall();
    });

    document.getElementById("name-input").addEventListener("keydown", e => {
      if (e.key === "Enter") startGame();
    });

    function releaseBall() {
      const attached = balls.filter(b => b.attached);
      if (attached.length === 0 || !isAiming) return;

      isAiming = false;
      const spd = 7;
      const vx = Math.cos(aimAngle) * spd;
      const vy = Math.sin(aimAngle) * spd;

      attached.forEach((b, i) => {
        setTimeout(() => {
          b.vx = vx;
          b.vy = vy;
          b.attached = false;
        }, i * 120);
      });
    }

    function updatePaddle() {
      if (isAiming && mouseX !== null) {
        const dx = mouseX - LAUNCH_X;
        const dy = mouseY - LAUNCH_Y;
        aimAngle = Math.atan2(dy, dx);
        aimAngle = Math.max(-Math.PI * 0.95, Math.min(-Math.PI * 0.05, aimAngle));
      }
    }

    function updateBalls() {
      balls.forEach(ball => {
        if (ball.attached) {
          ball.x = LAUNCH_X;
          ball.y = LAUNCH_Y;
          return;
        }

        ball.trail.push({ x: ball.x, y: ball.y });
        if (ball.trail.length > 10) ball.trail.shift();

        ball.x += ball.vx;
        ball.y += ball.vy;

        if (ball.x - ball.r < 0) {
          ball.x = ball.r;
          ball.vx = Math.abs(ball.vx);
        }
        if (ball.x + ball.r > W) {
          ball.x = W - ball.r;
          ball.vx = -Math.abs(ball.vx);
        }
        if (ball.y - ball.r < 0) {
          ball.y = ball.r;
          ball.vy = Math.abs(ball.vy);
        }

        for (let i = 0; i < bricks.length; i++) {
          const brick = bricks[i];
          if (!brick.alive) continue;

          if (
            ball.x + ball.r > brick.x &&
            ball.x - ball.r < brick.x + brick.w &&
            ball.y + ball.r > brick.y &&
            ball.y - ball.r < brick.y + brick.h
          ) {
            brick.hp--;
            const cx = brick.x + brick.w / 2;
            const cy = brick.y + brick.h / 2;

            if (brick.hp <= 0) {
              brick.alive = false;
              score += brick.color.pts;
              spawnParticles(cx, cy, brick.color.fill, 12);
              addFlash(cx, cy - 10, "+" + brick.color.pts, brick.color.fill);
            } else {
              spawnParticles(cx, cy, brick.color.fill, 4);
            }

            const oL = ball.x + ball.r - brick.x;
            const oR = brick.x + brick.w - (ball.x - ball.r);
            const oT = ball.y + ball.r - brick.y;
            const oB = brick.y + brick.h - (ball.y - ball.r);

            if (Math.min(oL, oR) < Math.min(oT, oB)) ball.vx *= -1;
            else ball.vy *= -1;

            break;
          }
        }

        if (ball.y - ball.r > H) ball.dead = true;
      });

      balls = balls.filter(b => !b.dead);

      if (balls.filter(b => !b.attached).length === 0 && gameState === "playing") {
        if (balls.length === 0) {
          nextBallCount++;
          isAiming = true;
          addBrickRow();

          if (bricks.some(b => b.alive && b.y + b.h >= LAUNCH_Y - 5)) {
            doGameOver("dead");
            return;
          }

          for (let i = 0; i < nextBallCount; i++) balls.push(makeBall());
          refreshHud();
        }
      }

      document.getElementById("score-display").textContent = String(score).padStart(5, "0");
    }

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(26,42,108,0.3)";
      ctx.lineWidth = 0.5;
      for (let x = 0; x < W; x += 26) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += 26) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBricks() {
      bricks.forEach(b => {
        if (!b.alive) return;

        const dmg = b.hp < b.maxHp;

        ctx.save();
        ctx.shadowColor = b.color.glow;
        ctx.shadowBlur = dmg ? 4 : 12;
        ctx.globalAlpha = dmg ? 0.5 : 1;
        ctx.fillStyle = b.color.fill;
        ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);

        ctx.globalAlpha = dmg ? 0.1 : 0.25;
        const sh = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
        sh.addColorStop(0, "#fff");
        sh.addColorStop(1, "transparent");
        ctx.fillStyle = sh;
        ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h / 2);
        ctx.restore();

        if (b.maxHp > 1) {
          ctx.save();
          ctx.font = `bold ${b.h * 0.55}px 'Orbitron', monospace`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = b.hp < b.maxHp ? "rgba(255,255,255,0.4)" : "rgba(255,255,255,0.9)";
          ctx.shadowColor = "#000";
          ctx.shadowBlur = 4;
          ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2);
          ctx.restore();
        }

        if (dmg) {
          ctx.strokeStyle = "rgba(0,0,0,0.6)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(b.x + b.w * 0.3, b.y);
          ctx.lineTo(b.x + b.w * 0.5, b.y + b.h);
          ctx.stroke();
        }
      });
    }

    function drawAimLine() {
      if (!isAiming || balls.filter(b => b.attached).length === 0) return;

      const spd = 220;
      const tx = LAUNCH_X + Math.cos(aimAngle) * spd;
      const ty = LAUNCH_Y + Math.sin(aimAngle) * spd;

      ctx.save();
      ctx.strokeStyle = "rgba(0,245,255,0.6)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(LAUNCH_X, LAUNCH_Y);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(0,245,255,0.8)";
      ctx.beginPath();
      ctx.arc(tx, ty, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPaddle() {
      ctx.save();
      ctx.fillStyle = "#00f5ff";
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(LAUNCH_X, LAUNCH_Y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawBall(ball) {
      ball.trail.forEach((pt, i) => {
        ctx.save();
        ctx.globalAlpha = (i / ball.trail.length) * 0.3;
        ctx.fillStyle = "#00f5ff";
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, ball.r * (i / ball.trail.length), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      ctx.save();
      ctx.shadowColor = "rgba(0,245,255,1)";
      ctx.shadowBlur = 18;
      const g = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
      g.addColorStop(0, "#fff");
      g.addColorStop(0.5, "#00f5ff");
      g.addColorStop(1, "#007aff");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawFlashes() {
      flashes.forEach(f => {
        ctx.save();
        ctx.globalAlpha = f.life;
        ctx.font = `bold 13px 'Orbitron',monospace`;
        ctx.fillStyle = f.color;
        ctx.shadowColor = f.color;
        ctx.shadowBlur = 12;
        ctx.textAlign = "center";
        ctx.fillText(f.text, f.x, f.y);
        ctx.restore();
      });
    }

    function refreshHud() {
      document.getElementById("score-display").textContent = String(score).padStart(5, "0");
      document.getElementById("player-display").textContent = currentPlayer;
      document.getElementById("lives-display").textContent = nextBallCount;
      document.getElementById("btn-quit").style.display = gameState === "playing" ? "inline-block" : "none";
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawGrid();

      if (gameState === "playing") {
        updatePaddle();
        updateBalls();

        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.life -= p.decay;
        });
        particles = particles.filter(p => p.life > 0);

        flashes.forEach(f => {
          f.y += f.vy;
          f.life -= 0.025;
        });
        flashes = flashes.filter(f => f.life > 0);
      }

      drawBricks();
      drawPaddle();
      drawAimLine();
      balls.forEach(drawBall);
      drawParticles();
      drawFlashes();

      requestAnimationFrame(loop);
    }

    async function saveCurrentScore() {
      const cleanName = sanitizeName(currentPlayer);

      if (!cleanName) throw new Error("플레이어 이름이 없습니다.");

      if (window.fbSave) {
        await window.fbSave(cleanName, score);
      }

      lbSaveLocal(cleanName, score);

      if (window.fbLoad) {
        const rows = await window.fbLoad();
        window._fbBoard = rows;
      } else {
        window._fbBoard = lbLoad();
      }

      return cleanName;
    }

    async function endGame(mode = "dead") {
      if (isEndingGame) return;
      isEndingGame = true;

      gameState = "gameover";
      gameOverMode = mode;

      try {
        const savedName = await saveCurrentScore();

        document.getElementById("fs-name").textContent = savedName;
        document.getElementById("fs-score").textContent = String(score).padStart(5, "0");

        if (mode === "quit") {
          document.getElementById("gameover-title").textContent = "GAME ENDED";
          document.getElementById("fs-detail").textContent = `BALLS ${nextBallCount}  ·  QUIT & SAVED`;
        } else {
          document.getElementById("gameover-title").textContent = "GAME OVER";
          document.getElementById("fs-detail").textContent = `BALLS ${nextBallCount}  ·  GAME OVER`;
        }

        lbRender("lb-go-wrap", savedName, score);
        lbRender("lb-start-wrap", savedName, score);
      } catch (e) {
        console.error("점수 저장/종료 처리 실패:", e);
        document.getElementById("fs-name").textContent = currentPlayer;
        document.getElementById("fs-score").textContent = String(score).padStart(5, "0");
        document.getElementById("fs-detail").textContent = "SCORE SAVE FAILED";
        lbRender("lb-go-wrap", null, null);
      }

      document.getElementById("btn-quit").style.display = "none";
      document.getElementById("ov-gameover").style.display = "flex";
      isEndingGame = false;
    }

    function doGameOver(mode = "dead") {
      endGame(mode);
    }

    function startGame() {
      const raw = document.getElementById("name-input").value;
      const clean = sanitizeName(raw);

      if (!clean) {
        const warn = document.getElementById("name-warn");
        warn.style.opacity = "1";
        document.getElementById("name-input").focus();
        setTimeout(() => { warn.style.opacity = "0"; }, 2000);
        return;
      }

      currentPlayer = clean;
      score = 0;
      lives = 1;
      nextBallCount = 1;
      isAiming = true;
      buildBricks();
      balls = [makeBall()];
      particles = [];
      flashes = [];
      gameState = "playing";

      document.getElementById("ov-start").style.display = "none";
      document.getElementById("ov-gameover").style.display = "none";
      document.getElementById("ov-win").style.display = "none";

      refreshHud();
    }

    function restartGame() {
      score = 0;
      lives = 1;
      nextBallCount = 1;
      isAiming = true;
      buildBricks();
      balls = [makeBall()];
      particles = [];
      flashes = [];
      gameState = "playing";

      document.getElementById("ov-gameover").style.display = "none";
      refreshHud();
    }

    function goToTitle() {
      document.getElementById("ov-gameover").style.display = "none";
      document.getElementById("ov-start").style.display = "flex";
      document.getElementById("btn-quit").style.display = "none";
      lbRender("lb-start-wrap");
      gameState = "idle";
    }

    function quitGame() {
      if (gameState !== "playing") return;

      const ok = confirm("게임을 그만두시겠습니까?\n현재 점수가 랭킹에 저장됩니다.");
      if (!ok) return;

      doGameOver("quit");
    }

    function nextLevel() {
      document.getElementById("ov-win").style.display = "none";
    }

    lbRender("lb-start-wrap");
    loop();

    (function () {
      const leftBtn = document.getElementById("touch-left");
      const rightBtn = document.getElementById("touch-right");
      const fireBtn = document.getElementById("touch-fire");

      function onLeft(down) {
        keys["ArrowLeft"] = down;
        down ? leftBtn.classList.add("active") : leftBtn.classList.remove("active");
      }

      function onRight(down) {
        keys["ArrowRight"] = down;
        down ? rightBtn.classList.add("active") : rightBtn.classList.remove("active");
      }

      function onFire() {
        if (gameState === "playing") releaseBall();
        fireBtn.classList.add("active");
        setTimeout(() => fireBtn.classList.remove("active"), 120);
      }

      leftBtn.addEventListener("touchstart", e => { e.preventDefault(); onLeft(true); }, { passive: false });
      leftBtn.addEventListener("touchend", e => { e.preventDefault(); onLeft(false); }, { passive: false });
      leftBtn.addEventListener("touchcancel", e => { e.preventDefault(); onLeft(false); }, { passive: false });

      rightBtn.addEventListener("touchstart", e => { e.preventDefault(); onRight(true); }, { passive: false });
      rightBtn.addEventListener("touchend", e => { e.preventDefault(); onRight(false); }, { passive: false });
      rightBtn.addEventListener("touchcancel", e => { e.preventDefault(); onRight(false); }, { passive: false });

      fireBtn.addEventListener("touchstart", e => { e.preventDefault(); onFire(); }, { passive: false });

      let lastTouchX = null;

      canvas.addEventListener("touchstart", e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mouseX = (e.touches[0].clientX - rect.left) * scaleX;
        mouseY = (e.touches[0].clientY - rect.top) * scaleY;
        lastTouchX = e.touches[0].clientX;
      }, { passive: false });

      canvas.addEventListener("touchmove", e => {
        e.preventDefault();
        if (lastTouchX === null) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mouseX = (e.touches[0].clientX - rect.left) * scaleX;
        mouseY = (e.touches[0].clientY - rect.top) * scaleY;
        lastTouchX = e.touches[0].clientX;
      }, { passive: false });

      canvas.addEventListener("touchend", e => {
        e.preventDefault();
        if (gameState === "playing") releaseBall();
        lastTouchX = null;
      }, { passive: false });
    })();
  </script>
</body>
