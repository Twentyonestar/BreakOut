<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #04050f;
    --panel: #080d1e;
    --border: #1a2a6c;
    --accent1: #00f5ff;
    --accent2: #ff006e;
    --accent3: #adff2f;
    --glow1: rgba(0,245,255,0.4);
    --glow2: rgba(255,0,110,0.4);
    --text: #e0f0ff;
    --dim: #4a6080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,245,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 20%, rgba(255,0,110,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 100;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: -0.01em;
    color: var(--accent1);
    text-shadow: 0 0 20px var(--glow1), 0 0 60px var(--glow1);
    margin-bottom: 12px;
  }

  .hud {
    display: flex;
    gap: 36px;
    margin-bottom: 12px;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
  }

  .hud-item label {
    color: var(--dim);
    display: block;
    font-size: 0.6rem;
    margin-bottom: 2px;
  }

  .hud-item span {
    color: var(--accent1);
    font-size: 1rem;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
  }

  #lives-display  { color: var(--accent2) !important; text-shadow: 0 0 10px var(--glow2); }
  #score-display  { text-shadow: 0 0 10px var(--glow1); }
  #level-display  { color: var(--accent3) !important; text-shadow: 0 0 10px rgba(173,255,47,0.4); }
  #player-display { color: var(--accent1) !important; text-shadow: 0 0 10px var(--glow1); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }

  .canvas-wrapper {
    position: relative;
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(0,245,255,0.1), 0 0 30px rgba(0,245,255,0.08), inset 0 0 60px rgba(0,0,30,0.8);
  }

  canvas { display: block; background: var(--panel); }

  /* ─── Overlays ─── */
  .overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(4,5,15,0.93);
    backdrop-filter: blur(4px);
    padding: 20px 28px;
    gap: 0;
  }

  .overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.9rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
  }

  .overlay.start h2   { color: var(--accent1); text-shadow: 0 0 30px var(--glow1); }
  .overlay.gameover h2{ color: var(--accent2); text-shadow: 0 0 30px var(--glow2); }
  .overlay.win h2     { color: var(--accent3); text-shadow: 0 0 30px rgba(173,255,47,0.6); }

  .overlay p {
    color: var(--dim);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .final-score-box {
    background: rgba(0,245,255,0.04);
    border: 1px solid rgba(0,245,255,0.15);
    padding: 8px 20px;
    margin-bottom: 14px;
    text-align: center;
  }

  .final-score-box .fs-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--accent1);
    letter-spacing: 0.15em;
    margin-bottom: 2px;
  }

  .final-score-box .fs-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--text);
    text-shadow: 0 0 14px var(--glow1);
    letter-spacing: 0.1em;
  }

  .final-score-box .fs-detail {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* ─── Name input ─── */
  .name-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    width: 100%;
  }

  .name-section label {
    color: var(--dim);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
  }

  .name-input {
    background: transparent;
    border: 1px solid var(--accent1);
    color: var(--accent1);
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-align: center;
    padding: 9px 18px;
    width: 210px;
    outline: none;
    box-shadow: 0 0 12px var(--glow1), inset 0 0 12px rgba(0,245,255,0.04);
    text-transform: uppercase;
    caret-color: var(--accent1);
  }

  .name-input::placeholder { color: var(--dim); font-size: 0.72rem; letter-spacing: 0.1em; }
  .name-input:focus { box-shadow: 0 0 22px var(--glow1), inset 0 0 18px rgba(0,245,255,0.08); }

  /* ─── Buttons ─── */
  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 10px 28px;
    border: 1px solid var(--accent1);
    background: transparent;
    color: var(--accent1);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 14px var(--glow1), inset 0 0 14px rgba(0,245,255,0.05);
  }

  .btn:hover { background: rgba(0,245,255,0.1); box-shadow: 0 0 28px var(--glow1), inset 0 0 28px rgba(0,245,255,0.1); }

  .btn.dim {
    border-color: var(--dim);
    color: var(--dim);
    box-shadow: none;
  }
  .btn.dim:hover { border-color: var(--accent1); color: var(--accent1); box-shadow: 0 0 14px var(--glow1); }

  .btn-row { display: flex; gap: 10px; margin-top: 6px; }

  /* ─── Leaderboard ─── */
  .lb-wrap {
    width: 100%;
    margin-bottom: 14px;
  }

  .lb-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .lb-header-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border));
  }

  .lb-header-line.rev {
    background: linear-gradient(to left, transparent, var(--border));
  }

  .lb-header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    white-space: nowrap;
  }

  .lb-empty {
    color: var(--dim);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 10px 0;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    margin-bottom: 3px;
    border: 1px solid rgba(26,42,108,0.4);
    background: rgba(0,0,20,0.35);
  }

  .lb-row.is-new {
    animation: newFlash 0.5s ease 4;
  }

  @keyframes newFlash {
    0%,100% { background: rgba(0,0,20,0.35); border-color: rgba(26,42,108,0.4); }
    50%      { background: rgba(0,245,255,0.1); border-color: rgba(0,245,255,0.5); }
  }

  .lb-rank {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 0.75rem;
    min-width: 30px;
    text-align: center;
  }

  .lb-rank.gold   { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.7); }
  .lb-rank.silver { color: #b0c4de; text-shadow: 0 0 8px rgba(176,196,222,0.4); }
  .lb-rank.bronze { color: #cd853f; text-shadow: 0 0 8px rgba(205,133,63,0.4); }

  .lb-name {
    flex: 1;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .lb-lv {
    font-size: 0.62rem;
    color: var(--dim);
    min-width: 30px;
    text-align: right;
    letter-spacing: 0.05em;
  }

  .lb-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent1);
    text-shadow: 0 0 8px var(--glow1);
    min-width: 58px;
    text-align: right;
    letter-spacing: 0.05em;
  }

  /* ─── Controls ─── */
  .controls {
    margin-top: 12px;
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
  }

  .controls kbd {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--text);
  }

  /* ─── Mobile Touch UI ─── */
  .touch-controls {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 90px;
    background: linear-gradient(to top, rgba(4,5,15,0.95), transparent);
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 200;
    touch-action: none;
  }

  .touch-zone {
    flex: 1;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.35;
    transition: opacity 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .touch-zone:active, .touch-zone.active {
    opacity: 0.85;
  }

  .touch-arrow {
    width: 52px;
    height: 52px;
    border: 2px solid var(--accent1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: var(--accent1);
    box-shadow: 0 0 16px var(--glow1);
  }

  .touch-fire {
    width: 64px;
    height: 64px;
    border: 2px solid var(--accent3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--accent3);
    box-shadow: 0 0 16px rgba(173,255,47,0.4);
  }

  @media (pointer: coarse) {
    .touch-controls { display: none; }
    .controls { display: none; }
    body {
      overflow: hidden;
      padding: 8px;
      box-sizing: border-box;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
    }
    .canvas-wrapper {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas { touch-action: none; width: 100%; height: auto; display: block; }
  }

</style>
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, query, orderByChild, limitToLast, get, onValue }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1bb4vMa4FMMdkArBCmDk0BLCDz9QIjy4",
      authDomain: "breakout-game-4ad28.firebaseapp.com",
      databaseURL: "https://breakout-game-4ad28-default-rtdb.firebaseio.com",
      projectId: "breakout-game-4ad28",
      storageBucket: "breakout-game-4ad28.firebasestorage.app",
      messagingSenderId: "358815160809",
      appId: "1:358815160809:web:5c33f4f8a095d25ae15378"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const SCORES_REF = 'scores';

    // 점수 저장
    window.fbSave = async function(name, score) {
      try {
        await push(ref(db, SCORES_REF), {
          name: name.slice(0,10).toUpperCase(),
          score,
          ts: Date.now()
        });
      } catch(e) { console.warn('fbSave error', e); }
    };

    // TOP 10 불러오기
    window.fbLoad = async function() {
      try {
        const q = query(ref(db, SCORES_REF), orderByChild('score'), limitToLast(10));
        const snap = await get(q);
        const rows = [];
        snap.forEach(child => rows.push(child.val()));
        rows.sort((a,b) => b.score - a.score);
        return rows;
      } catch(e) { console.warn('fbLoad error', e); return []; }
    };

    // 실시간 랭킹 구독
    window.fbSubscribe = function(callback) {
      const q = query(ref(db, SCORES_REF), orderByChild('score'), limitToLast(10));
      onValue(q, snap => {
        const rows = [];
        snap.forEach(child => rows.push(child.val()));
        rows.sort((a,b) => b.score - a.score);
        callback(rows);
      });
    };

    // 초기 랭킹 로드
    window.fbSubscribe(rows => {
      window._fbBoard = rows;
      if (window.lbRenderFb) window.lbRenderFb('lb-start-wrap', null, null);
    });
  </script>

<body>

<h1>Break Out!</h1>

<div class="hud">
  <div class="hud-item">
    <label>PLAYER</label>
    <span id="player-display">---</span>
  </div>
  <div class="hud-item">
    <label>SCORE</label>
    <span id="score-display">00000</span>
  </div>
  <div class="hud-item">
    <label>BALLS</label>
    <span id="lives-display">♥</span>
  </div>
</div>

<div class="canvas-wrapper">
  <canvas id="game" width="520" height="520"></canvas>

  <!-- START -->
  <div class="overlay start" id="ov-start">

    <div class="name-section" style="margin-bottom:0">
      <label>ENTER YOUR NAME</label>
      <input class="name-input" id="name-input" type="text" maxlength="10"
             placeholder="PLAYER NAME" autocomplete="off" spellcheck="false"/>
      <span id="name-warn" style="color:var(--accent2);font-size:0.72rem;letter-spacing:0.1em;min-height:1em;opacity:0;transition:opacity 0.2s;">이름을 입력하세요</span>
    </div>

    <div class="lb-wrap" id="lb-start-wrap" style="margin-top:12px"></div>

    <button class="btn" id="btn-start" onclick="startGame()">START GAME</button>

  </div>

  <!-- GAME OVER -->
  <div class="overlay gameover" id="ov-gameover" style="display:none">
    <h2>GAME OVER</h2>

    <div class="final-score-box" id="fs-box">
      <div class="fs-name" id="fs-name"></div>
      <div class="fs-score" id="fs-score"></div>
      <div class="fs-detail" id="fs-detail"></div>
    </div>

    <div class="lb-wrap" id="lb-go-wrap"></div>

    <div class="btn-row">
      <button class="btn" onclick="restartGame()">RETRY</button>
      <button class="btn dim" onclick="goToTitle()">TITLE</button>
    </div>
  </div>

  <!-- WIN -->
  <div class="overlay win" id="ov-win" style="display:none">
    <h2>STAGE CLEAR!</h2>
    <p id="win-score-text" style="color:var(--text);font-family:'Orbitron',sans-serif;font-size:1rem;margin-bottom:14px"></p>
    <button class="btn" onclick="nextLevel()">NEXT LEVEL ▶</button>
  </div>

</div>

<!-- Touch Controls (mobile) -->
<div class="touch-controls" id="touch-controls">
  <div class="touch-zone" id="touch-left">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><polyline points="15,5 9,12 15,19" stroke="var(--accent1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="touch-zone" id="touch-fire">
    <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="10" fill="none" stroke="var(--accent3)" stroke-width="2.5"/><circle cx="14" cy="14" r="5" fill="var(--accent3)"/></svg>
  </div>
  <div class="touch-zone" id="touch-right">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><polyline points="9,5 15,12 9,19" stroke="var(--accent1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>



<script>
// ─── Canvas ───────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── State ────────────────────────────────────────
let gameState = 'idle'; // idle | playing
let score = 0, lives = 1;
let nextBallCount = 1; // 다음 발사 때 공 개수
let aimAngle = -Math.PI * 0.75; // 현재 조준 각도 (기본: 왼쪽 위)
let isAiming = true; // true=각도조준중 false=발사완료
let currentPlayer = 'PLAYER';

// ─── Leaderboard ──────────────────────────────────
const LS_KEY = 'brkbrkboard_v1';

function lbLoad() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

function lbSave(name, sc) {
  // Firebase에 저장
  if (window.fbSave) window.fbSave(name, sc);
  // 로컬에도 백업
  let board = lbLoad();
  board.push({ name: name.slice(0,10).toUpperCase(), score: sc });
  board.sort((a,b) => b.score - a.score);
  board = board.slice(0, 10);
  try { localStorage.setItem(LS_KEY, JSON.stringify(board)); } catch(e){}
  return board;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.lbRenderFb = lbRender;
function lbRender(wrapId, highlightName, highlightScore) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  // Firebase 데이터 우선, 없으면 로컬
  const board = (window._fbBoard && window._fbBoard.length > 0
    ? window._fbBoard
    : lbLoad()).slice(0, 3);

  const RANKS = [
    { label:'1ST', cls:'gold' },
    { label:'2ND', cls:'silver' },
    { label:'3RD', cls:'bronze' },
  ];

  let html = `
    <div class="lb-header">
      <div class="lb-header-line rev"></div>
      <div class="lb-header-title">TOP RANKING</div>
      <div class="lb-header-line"></div>
    </div>`;

  if (board.length === 0) {
    html += `<div class="lb-empty">아직 기록이 없습니다</div>`;
  } else {
    board.forEach((e, i) => {
      const isNew = highlightName && e.name === highlightName && e.score === highlightScore && i === lbLoad().findIndex(x => x.name === highlightName && x.score === highlightScore);
      html += `
        <div class="lb-row${isNew ? ' is-new' : ''}">
          <span class="lb-rank ${RANKS[i].cls}">${RANKS[i].label}</span>
          <span class="lb-name">${esc(e.name)}</span>
          
          <span class="lb-score">${String(e.score).padStart(5,'0')}</span>
        </div>`;
    });
  }

  wrap.innerHTML = `<div class="lb-wrap">${html}</div>`;
}

// ─── Launch Point (fixed bottom-right) ───────────
const LAUNCH_X = W - 20;
const LAUNCH_Y = H - 20;

// ─── Ball ─────────────────────────────────────────
let balls = [];

function makeBall() {
  return {
    x: LAUNCH_X,
    y: LAUNCH_Y,
    r: 7,
    vx: 0,
    vy: 0,
    attached: true,
    trail: []
  };
}

// ─── Bricks ───────────────────────────────────────
let bricks = [];
const BRICK_COLS = 7, BRICK_ROWS_BASE = 3, BRICK_PAD = 4, BRICK_TOP = 50;
const COLORS = [
  { fill:'#ff006e', glow:'rgba(255,0,110,0.6)',   pts:50 },
  { fill:'#ff4500', glow:'rgba(255,69,0,0.6)',    pts:40 },
  { fill:'#ffa500', glow:'rgba(255,165,0,0.6)',   pts:30 },
  { fill:'#adff2f', glow:'rgba(173,255,47,0.5)',  pts:20 },
  { fill:'#00f5ff', glow:'rgba(0,245,255,0.5)',   pts:10 },
  { fill:'#a259ff', glow:'rgba(162,89,255,0.5)',  pts:15 },
  { fill:'#ff75c3', glow:'rgba(255,117,195,0.5)', pts:25 },
];

const BRICK_H = 22, BRICK_MOVE = BRICK_H + BRICK_PAD; // 블록 높이 + 간격

function addBrickRow() {
  // 기존 블록 한 줄 아래로
  bricks.forEach(b => { b.y += BRICK_MOVE; });
  const cols = BRICK_COLS;
  const bw = (W - BRICK_PAD * (cols + 1)) / cols;
  const count = 2 + Math.floor(Math.random() * (cols - 1));
  const positions = Array.from({length: cols}, (_, i) => i)
    .sort(() => Math.random() - 0.5).slice(0, count);
  // 블록 HP = 현재 공 개수와 동일
  const hp = nextBallCount;
  const brickColor = hp >= 5
    ? { fill:'#ff006e', glow:'rgba(255,0,110,0.8)', pts: hp * 50 }
    : hp >= 3
    ? { fill:'#ffa500', glow:'rgba(255,165,0,0.8)', pts: hp * 40 }
    : hp >= 2
    ? { fill:'#adff2f', glow:'rgba(173,255,47,0.6)', pts: hp * 30 }
    : { fill:'#00f5ff', glow:'rgba(0,245,255,0.5)', pts: 10 };
  positions.forEach(c => {
    bricks.push({
      x: BRICK_PAD + c * (bw + BRICK_PAD),
      y: BRICK_TOP,
      w: bw, h: BRICK_H,
      color: brickColor,
      hp, maxHp: hp, alive: true
    });
  });
}

function buildBricks() {
  bricks = [];
  // 처음엔 3줄 미리 생성
  for (let i = 0; i < 2; i++) addBrickRow();
}

// ─── Particles / Flashes ──────────────────────────
let particles = [], flashes = [];

function spawnParticles(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life:1, decay:0.04+Math.random()*0.04, r:2+Math.random()*3, color });
  }
}

function addFlash(x, y, text, color) {
  flashes.push({ x, y, text, color, life:1, vy:-1.2 });
}

// ─── Input ────────────────────────────────────────
const keys = {};
let mouseX = null, mouseY = null;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); if (gameState === 'playing') releaseBall(); }
  if (['ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => { const r=canvas.getBoundingClientRect(); mouseX=e.clientX-r.left; mouseY=e.clientY-r.top; });
canvas.addEventListener('click', () => { if (gameState === 'playing') releaseBall(); });

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

function releaseBall() {
  const attached = balls.filter(b => b.attached);
  if (attached.length === 0) return;
  if (!isAiming) return;
  isAiming = false;
  const spd = 7;
  const vx = Math.cos(aimAngle) * spd;
  const vy = Math.sin(aimAngle) * spd;
  attached.forEach((b, i) => {
    setTimeout(() => {
      b.vx = vx; b.vy = vy; b.attached = false;
    }, i * 120);
  });
}

// ─── Physics ──────────────────────────────────────
function updatePaddle() {
  // 조준 중일 때 마우스 위치로 각도 업데이트
  if (isAiming && mouseX !== null) {
    const dx = mouseX - LAUNCH_X;
    const dy = mouseY - LAUNCH_Y;
    aimAngle = Math.atan2(dy, dx);
    // 위쪽 반원만 허용 (아래로 못 쏘게)
    aimAngle = Math.max(-Math.PI * 0.95, Math.min(-Math.PI * 0.05, aimAngle));
  }
}

function updateBalls() {
  balls.forEach(ball => {
    if (ball.attached) {
      ball.x = LAUNCH_X;
      ball.y = LAUNCH_Y;
      return;
    }

    ball.trail.push({ x:ball.x, y:ball.y });
    if (ball.trail.length > 10) ball.trail.shift();

    ball.x += ball.vx; ball.y += ball.vy;

    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

    // Bricks
    for (let i = 0; i < bricks.length; i++) {
      const brick = bricks[i];
      if (!brick.alive) continue;
      if (ball.x+ball.r > brick.x && ball.x-ball.r < brick.x+brick.w &&
          ball.y+ball.r > brick.y && ball.y-ball.r < brick.y+brick.h) {
        brick.hp--;
        const cx = brick.x + brick.w/2, cy = brick.y + brick.h/2;
        if (brick.hp <= 0) {
          brick.alive = false;
          score += brick.color.pts;
          spawnParticles(cx, cy, brick.color.fill, 12);
          addFlash(cx, cy-10, '+' + brick.color.pts, brick.color.fill);
        } else {
          spawnParticles(cx, cy, brick.color.fill, 4);
        }
        const oL = ball.x+ball.r-brick.x, oR = brick.x+brick.w-(ball.x-ball.r);
        const oT = ball.y+ball.r-brick.y, oB = brick.y+brick.h-(ball.y-ball.r);
        if (Math.min(oL,oR) < Math.min(oT,oB)) ball.vx *= -1; else ball.vy *= -1;
        break;
      }
    }

    if (ball.y - ball.r > H) ball.dead = true;
  });

  balls = balls.filter(b => !b.dead);

  // 날아다니는 공이 모두 사라지면 → 새 줄 추가 + 다음 발사 준비
  if (balls.filter(b => !b.attached).length === 0 && gameState === 'playing') {
    if (balls.length === 0) { // attached 공도 없음 = 이번 라운드 완전히 끝
      nextBallCount++;
      isAiming = true;
      addBrickRow();
      if (bricks.some(b => b.alive && b.y + b.h >= LAUNCH_Y - 5)) {
        doGameOver(); return;
      }
      for (let i = 0; i < nextBallCount; i++) balls.push(makeBall());
      refreshHud();
    }
  }

  document.getElementById('score-display').textContent = String(score).padStart(5,'0');
}

function loseLife() { /* 탈락 없음 - 공이 바닥에 떨어져도 계속 */ }

function checkWin() {
  // 이 모드는 무한 진행 - 벽돌 다 깨도 계속 (addBrickRow로 계속 추가됨)
}

function doGameOver() {
  gameState = 'gameover';
  lbSave(currentPlayer, score);

  document.getElementById('fs-name').textContent = currentPlayer;
  document.getElementById('fs-score').textContent = String(score).padStart(5,'0');
  document.getElementById('fs-detail').textContent = `BALLS ${nextBallCount}  ·  GAME OVER`;

  // Firebase 최신 랭킹 불러와서 렌더링
  if (window.fbLoad) {
    window.fbLoad().then(rows => {
      window._fbBoard = rows;
      lbRender('lb-go-wrap', currentPlayer, score);
    });
  } else {
    lbRender('lb-go-wrap', currentPlayer, score);
  }
  document.getElementById('ov-gameover').style.display = 'flex';
}

// ─── Draw ──────────────────────────────────────────
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(26,42,108,0.3)'; ctx.lineWidth = 0.5;
  for (let x=0;x<W;x+=26){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=26){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    const dmg = b.hp < b.maxHp;
    ctx.save();
    ctx.shadowColor = b.color.glow; ctx.shadowBlur = dmg ? 4 : 12;
    ctx.globalAlpha = dmg ? 0.5 : 1;
    ctx.fillStyle = b.color.fill;
    ctx.fillRect(b.x+1, b.y+1, b.w-2, b.h-2);
    ctx.globalAlpha = dmg ? 0.1 : 0.25;
    const sh = ctx.createLinearGradient(b.x, b.y, b.x, b.y+b.h);
    sh.addColorStop(0,'#fff'); sh.addColorStop(1,'transparent');
    ctx.fillStyle = sh;
    ctx.fillRect(b.x+1, b.y+1, b.w-2, b.h/2);
    ctx.restore();
    // HP 숫자 표시 (2방 이상일 때)
    if (b.maxHp > 1) {
      ctx.save();
      ctx.font = `bold ${b.h * 0.55}px 'Orbitron', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = b.hp < b.maxHp ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.9)';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 4;
      ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2);
      ctx.restore();
    }
    if (dmg) {
      ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(b.x+b.w*0.3,b.y); ctx.lineTo(b.x+b.w*0.5,b.y+b.h); ctx.stroke();
    }
  });
}

function drawAimLine() {
  if (!isAiming || balls.filter(b => b.attached).length === 0) return;
  const spd = 220;
  const tx = LAUNCH_X + Math.cos(aimAngle) * spd;
  const ty = LAUNCH_Y + Math.sin(aimAngle) * spd;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,245,255,0.6)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(LAUNCH_X, LAUNCH_Y);
  ctx.lineTo(tx, ty);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(0,245,255,0.8)';
  ctx.beginPath();
  ctx.arc(tx, ty, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPaddle() { /* 패들 없음 - 발사 위치 점만 */
  ctx.save();
  ctx.fillStyle = '#00f5ff';
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.arc(LAUNCH_X, LAUNCH_Y, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  return;
  ctx.save();
  ctx.shadowColor='rgba(0,245,255,0.8)'; ctx.shadowBlur=20;
  const g=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  g.addColorStop(0,'#00f5ff'); g.addColorStop(1,'#007aff');
  ctx.fillStyle=g; ctx.beginPath();
  ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6); ctx.fill();
  ctx.globalAlpha=0.4; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.roundRect(paddle.x+4,paddle.y+2,paddle.w-8,paddle.h/2-1,3); ctx.fill();
  ctx.restore();
}

function drawBall(ball) {
  ball.trail.forEach((pt,i)=>{
    ctx.save(); ctx.globalAlpha=(i/ball.trail.length)*0.3; ctx.fillStyle='#00f5ff';
    ctx.beginPath(); ctx.arc(pt.x,pt.y,ball.r*(i/ball.trail.length),0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  ctx.save();
  ctx.shadowColor='rgba(0,245,255,1)'; ctx.shadowBlur=18;
  const g=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
  g.addColorStop(0,'#fff'); g.addColorStop(0.5,'#00f5ff'); g.addColorStop(1,'#007aff');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawFlashes() {
  flashes.forEach(f=>{
    ctx.save(); ctx.globalAlpha=f.life; ctx.font=`bold 13px 'Orbitron',monospace`;
    ctx.fillStyle=f.color; ctx.shadowColor=f.color; ctx.shadowBlur=12;
    ctx.textAlign='center'; ctx.fillText(f.text,f.x,f.y); ctx.restore();
  });
}

// ─── HUD ──────────────────────────────────────────
function refreshHud() {
  document.getElementById('score-display').textContent  = String(score).padStart(5,'0');
  document.getElementById('player-display').textContent = currentPlayer;
  document.getElementById('lives-display').textContent = nextBallCount;
}

// ─── Main Loop ────────────────────────────────────
function loop() {
  ctx.clearRect(0,0,W,H);
  drawGrid();

  if (gameState === 'playing') {
    updatePaddle(); updateBalls();
    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=p.decay; });
    particles = particles.filter(p=>p.life>0);
    flashes.forEach(f=>{ f.y+=f.vy; f.life-=0.025; });
    flashes = flashes.filter(f=>f.life>0);
  }

  drawBricks(); drawPaddle(); drawAimLine(); balls.forEach(drawBall); drawParticles(); drawFlashes();
  requestAnimationFrame(loop);
}

// ─── Flow ─────────────────────────────────────────
function startGame() {
  const raw = document.getElementById('name-input').value.trim();
  if (!raw) {
    const warn = document.getElementById('name-warn');
    warn.style.opacity = '1';
    document.getElementById('name-input').focus();
    setTimeout(() => { warn.style.opacity = '0'; }, 2000);
    return;
  }
  currentPlayer = raw.toUpperCase().slice(0,10);
  score=0; lives=1;
  nextBallCount=1; isAiming=true; buildBricks(); balls=[makeBall()]; particles=[]; flashes=[];
  gameState='playing';
  document.getElementById('ov-start').style.display='none';
  refreshHud();
}

function restartGame() {
  score=0; lives=1;
  nextBallCount=1; isAiming=true; buildBricks(); balls=[makeBall()]; particles=[]; flashes=[];
  gameState='playing';
  document.getElementById('ov-gameover').style.display='none';
  refreshHud();
}

function goToTitle() {
  document.getElementById('ov-gameover').style.display='none';
  document.getElementById('ov-start').style.display='flex';
  lbRender('lb-start-wrap');
  gameState='idle';
}



// ─── Init ─────────────────────────────────────────
lbRender('lb-start-wrap');
loop();

// ─── Touch Controls ───────────────────────────────
(function() {
  const leftBtn  = document.getElementById('touch-left');
  const rightBtn = document.getElementById('touch-right');
  const fireBtn  = document.getElementById('touch-fire');

  function onLeft(down)  { keys['ArrowLeft']  = down; if (down) leftBtn.classList.add('active');  else leftBtn.classList.remove('active'); }
  function onRight(down) { keys['ArrowRight'] = down; if (down) rightBtn.classList.add('active'); else rightBtn.classList.remove('active'); }
  function onFire()      { if (gameState === 'playing') releaseBall(); fireBtn.classList.add('active'); setTimeout(() => fireBtn.classList.remove('active'), 120); }

  // Button events
  leftBtn.addEventListener('touchstart',  e => { e.preventDefault(); onLeft(true); },  {passive:false});
  leftBtn.addEventListener('touchend',    e => { e.preventDefault(); onLeft(false); }, {passive:false});
  leftBtn.addEventListener('touchcancel', e => { e.preventDefault(); onLeft(false); }, {passive:false});
  rightBtn.addEventListener('touchstart',  e => { e.preventDefault(); onRight(true); },  {passive:false});
  rightBtn.addEventListener('touchend',    e => { e.preventDefault(); onRight(false); }, {passive:false});
  rightBtn.addEventListener('touchcancel', e => { e.preventDefault(); onRight(false); }, {passive:false});
  fireBtn.addEventListener('touchstart', e => { e.preventDefault(); onFire(); }, {passive:false});

  // Canvas swipe: drag finger to move paddle directly
  let lastTouchX = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    mouseY = (e.touches[0].clientY - rect.top) * scaleY;
    lastTouchX = e.touches[0].clientX;
  }, {passive:false});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (lastTouchX === null) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    mouseY = (e.touches[0].clientY - rect.top) * scaleY;
    lastTouchX = e.touches[0].clientX;
  }, {passive:false});

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (gameState === 'playing') releaseBall();
    lastTouchX = null;
  }, {passive:false});
})();

</script>
